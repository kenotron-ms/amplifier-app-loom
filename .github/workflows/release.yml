name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # macOS — CGO enabled, includes tray
          - name: darwin-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            cgo: "1"
            asset: loom-darwin-arm64

          - name: darwin-amd64
            os: macos-15-intel
            goos: darwin
            goarch: amd64
            cgo: "1"
            asset: loom-darwin-amd64

          # Linux — CGO enabled on native amd64, disabled for arm64 cross-compile
          - name: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: "1"
            asset: loom-linux-amd64

          - name: linux-arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            cgo: "0"
            asset: loom-linux-arm64

          # Windows — CGO disabled (tray excluded)
          - name: windows-amd64
            os: windows-latest
            goos: windows
            goarch: amd64
            cgo: "0"
            asset: loom-windows-amd64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux CGO deps (amd64)
        if: matrix.os == 'ubuntu-latest' && matrix.cgo == '1'
        run: sudo apt-get update && sudo apt-get install -y --fix-missing gcc libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        shell: bash
        run: |
          cd ui && npm install && npm run build
          cd ..
          rm -rf web/dist
          cp -r ui/dist web/dist

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          go build \
            -ldflags "-X github.com/ms/amplifier-app-loom/internal/api.Version=${VERSION} -s -w" \
            -o dist/${{ matrix.asset }} \
            ./cmd/loom/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          retention-days: 1

  sign-macos:
    name: Sign & Notarize macOS (${{ matrix.arch }})
    needs: build
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            asset: loom-darwin-arm64
          - arch: amd64
            asset: loom-darwin-amd64
    steps:
      - uses: actions/checkout@v6

      - name: Download darwin artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.asset }}
          path: dist

      - name: Make binary executable
        run: chmod +x dist/${{ matrix.asset }}

      - name: Package, sign, notarize, create DMG
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          VERSION="${{ github.ref_name }}"
          bash packaging/macos/package.sh \
            dist/${{ matrix.asset }} \
            ${{ matrix.arch }} \
            "$VERSION"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: loom-darwin-${{ matrix.arch }}.dmg
          path: dist/loom-darwin-${{ matrix.arch }}.dmg
          retention-days: 1

  release:
    name: Create Release
    needs: [build, sign-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Make binaries executable
        run: |
          chmod +x dist/loom-linux-amd64 dist/loom-linux-arm64
          chmod +x dist/loom-darwin-arm64 dist/loom-darwin-amd64

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt && cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          name: "Loom ${{ github.ref_name }}"
          body: |
            ## Loom ${{ github.ref_name }}

            ### Install

            **macOS / Linux**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```

            Then start the daemon:
            ```sh
            loom install && loom start
            # Web UI → http://localhost:7700
            ```

            ### What's included
            - macOS builds ship as a signed & notarized `.dmg` with the system tray app (`loom tray`)
            - All builds include the web UI at `http://localhost:7700`
            - Configure your AI provider (Anthropic / OpenAI) from the Settings tab in the UI
          files: |
            dist/loom-darwin-arm64
            dist/loom-darwin-amd64
            dist/loom-darwin-arm64.dmg
            dist/loom-darwin-amd64.dmg
            dist/loom-linux-amd64
            dist/loom-linux-arm64
            dist/loom-windows-amd64.exe
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
