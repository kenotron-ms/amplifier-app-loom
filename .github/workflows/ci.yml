name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Create web dist placeholder
        run: mkdir -p web/dist && touch web/dist/.keep

      - name: Test
        run: go test ./...

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: "0"

          - name: darwin-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            cgo: "0"

          - name: windows-amd64
            os: windows-latest
            goos: windows
            goarch: amd64
            cgo: "0"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          mkdir -p dist
          go build -o dist/loom-${{ matrix.name }}${{ matrix.goos == 'windows' && '.exe' || '' }} ./cmd/loom/
